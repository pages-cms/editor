name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build Registry
        run: npm run registry:build

      - name: Strict Consumer Fixture
        run: npm run fixture:strict

      - name: Registry Dependency Contract
        run: npm run check:registry-deps
